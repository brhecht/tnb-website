name: Glossary Cron

# Multi-mode discovery + generation engine.
#
# Scheduled mode: weekly cron, fires Mondays 13:00 UTC.
# Manual modes (workflow_dispatch):
#   - bootstrap: one-time large initial corpus (~30-40 terms)
#   - weekly: ongoing freshness layer
#   - manual: read scripts/manual-terms.txt, generate the listed terms
#   - gap-audit: adversarial completeness check, up to ~50 missing terms
#   - topic-depth: per-topic forcing function (REQUIRES topic input)
#   - source-scan: deterministic source-aggregator polling for viral / emerging
#
# Modes commit MD files to /content/glossary/. Vercel auto-deploys from main.
# Failures ping Brain Inbox /api/handoff-notify (recipient: nico).

on:
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'weekly'
        type: choice
        options:
          - weekly
          - bootstrap
          - manual
          - gap-audit
          - topic-depth
          - source-scan
      topic:
        description: 'Topic name (REQUIRED for topic-depth mode; ignored otherwise)'
        required: false
        type: choice
        options:
          - ''
          - 'AI Models & Capabilities'
          - 'Agents & Automation'
          - 'Builder Tools'
          - 'Patterns & Practices'
          - 'Roles & Org'
          - 'Business Models'
          - 'Infrastructure'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install script dependencies
        run: npm install --no-save --no-package-lock gray-matter @anthropic-ai/sdk

      - name: Determine mode + topic
        id: mode
        run: |
          MODE="${{ github.event.inputs.mode }}"
          TOPIC="${{ github.event.inputs.topic }}"
          if [ -z "$MODE" ]; then
            MODE="weekly"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "topic=$TOPIC" >> "$GITHUB_OUTPUT"
          if [ "$MODE" = "topic-depth" ] && [ -z "$TOPIC" ]; then
            echo "::error::topic-depth mode requires the 'topic' input"
            exit 1
          fi
          echo "Running mode=$MODE${TOPIC:+ topic=$TOPIC}"

      - name: Generate terms
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ steps.mode.outputs.topic }}" ]; then
            node scripts/glossary-cron.mjs "${{ steps.mode.outputs.mode }}" "${{ steps.mode.outputs.topic }}"
          else
            node scripts/glossary-cron.mjs "${{ steps.mode.outputs.mode }}"
          fi

      - name: Commit changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/glossary/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            COUNT=$(git diff --cached --name-only | wc -l | tr -d ' ')
            DATE=$(date -u +%Y-%m-%d)
            MODE_LABEL="${{ steps.mode.outputs.mode }}"
            TOPIC_LABEL="${{ steps.mode.outputs.topic }}"
            if [ -n "$TOPIC_LABEL" ]; then
              MSG="Glossary cron ($MODE_LABEL: $TOPIC_LABEL): $COUNT term file(s) ($DATE)"
            else
              MSG="Glossary cron ($MODE_LABEL): $COUNT term file(s) ($DATE)"
            fi
            git commit -m "$MSG"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
            echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          fi

      - name: Summary
        if: success()
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          TOPIC="${{ steps.mode.outputs.topic }}"
          echo "### Glossary Cron — $MODE${TOPIC:+ ($TOPIC)} ✅" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.commit.outputs.committed }}" = "true" ]; then
            echo "Committed ${{ steps.commit.outputs.count }} file changes." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No changes to commit (cron ran clean but produced no new terms)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Notify Brain Inbox on failure
        if: failure()
        continue-on-error: true
        env:
          HANDOFF_SECRET: ${{ secrets.HANDOFF_SECRET }}
        run: |
          MODE_LABEL="${{ steps.mode.outputs.mode }}"
          [ -z "$MODE_LABEL" ] && MODE_LABEL="unknown"
          PROJECT="TNB Glossary Cron"
          SUMMARY="Glossary cron failed in ${MODE_LABEL} mode. See https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }} for logs."
          PAYLOAD=$(jq -n \
            --arg project "$PROJECT" \
            --arg summary "$SUMMARY" \
            --arg secret "$HANDOFF_SECRET" \
            '{project: $project, summary: $summary, recipient: "nico@humbleconviction.com", secret: $secret}')
          curl -fsS -X POST https://brain-inbox-six.vercel.app/api/handoff-notify \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            || echo "Brain Inbox notification failed (non-fatal)"
